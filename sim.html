<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sim demo — fullscreen canvas</title>
  <link rel="stylesheet" href="./shared/cohesion.css" />
  <script type="module" src="./shared/cohesion.js"></script>
  <style> html, body { height: 100%; overflow: hidden; } </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="readout" id="readout">particles 300</div>

  <control-panel floating title="Controls">
    <div class="control">
      <div class="control-head"><span class="name">count</span><span class="value" id="vn">300</span></div>
      <input type="range" min="50" max="800" step="10" value="300" id="count" />
    </div>
    <div class="control">
      <div class="control-head"><span class="name">speed</span><span class="value" id="vs">1.0×</span></div>
      <input type="range" min="0" max="3" step="0.1" value="1" id="speed" />
    </div>
    <label class="check"><input type="checkbox" id="trails" checked /> trails</label>
  </control-panel>

  <div class="control-bar">
    <button class="btn" id="pause">⏸</button>
    <about-modal label="about">
      <h2 class="title">Sim Demo</h2>
      <p>A throwaway particle field to exercise the fullscreen-canvas components: the floating
        semitransparent <code>&lt;control-panel&gt;</code>, the bottom control bar, the stats
        readout, and the pinned footer overlay.</p>
      <p>Position update: $x_{t+1} = x_t + v\,\Delta t$.</p>
    </about-modal>
  </div>

  <mike-footer overlay></mike-footer>

  <script>
    const cv = document.getElementById("c"), ctx = cv.getContext("2d");
    let W, H, parts = [], running = true;
    const $ = (id) => document.getElementById(id);
    function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
    addEventListener("resize", resize); resize();
    function seed(n) {
      parts = Array.from({ length: n }, () => ({
        x: Math.random() * W, y: Math.random() * H,
        vx: (Math.random() - .5) * 2, vy: (Math.random() - .5) * 2,
      }));
    }
    seed(300);
    const accent = getComputedStyle(document.body).getPropertyValue("--accent").trim() || "#7c8cf8";
    function frame() {
      const sp = +$("speed").value, trails = $("trails").checked;
      ctx.fillStyle = trails ? "rgba(14,15,22,0.12)" : "#0e0f16";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = accent;
      for (const p of parts) {
        p.x = (p.x + p.vx * sp + W) % W; p.y = (p.y + p.vy * sp + H) % H;
        ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, 7); ctx.fill();
      }
      $("readout").textContent = "particles " + parts.length;
      if (running) requestAnimationFrame(frame);
    }
    frame();
    $("count").oninput = (e) => { $("vn").textContent = e.target.value; seed(+e.target.value); };
    $("speed").oninput = (e) => { $("vs").textContent = (+e.target.value).toFixed(1) + "×"; };
    $("pause").onclick = () => {
      running = !running; $("pause").textContent = running ? "⏸" : "▶";
      if (running) frame();
    };
  </script>
</body>
</html>
